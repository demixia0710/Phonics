<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自然拼读探险 - 第一层级</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap');
        
        body {
            font-family: 'Lexend', 'PingFang SC', sans-serif;
            background: #F0F9FF; /* 清爽的天蓝色背景 */
            touch-action: manipulation;
        }

        /* 模拟滚轮效果 */
        .picker-container {
            height: 200px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .picker-container::-webkit-scrollbar { display: none; }
        
        .picker-item {
            height: 100px;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            transition: all 0.3s;
            color: #CBD5E1;
        }

        .picker-item.active {
            color: #0EA5E9;
            transform: scale(1.2);
        }

        .word-card {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-radius: 2rem;
        }

        .btn-bounce:active { transform: scale(0.9); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 pb-12">

    <header class="w-full max-w-md flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🦉</span>
            <span class="font-bold text-slate-700">Level 1: Short A</span>
        </div>
        <div class="bg-sky-100 text-sky-600 px-3 py-1 rounded-full text-sm font-bold">
            1 / 30 族群
        </div>
    </header>

    <main class="w-full max-w-md bg-white word-card p-8 flex flex-col items-center relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-sky-50 rounded-full"></div>
        
        <div class="flex items-center justify-center space-x-4 mb-8">
            <div class="picker-container w-24 border-r-2 border-dashed border-sky-100" id="onsetPicker">
                </div>

            <div class="text-7xl font-extrabold text-orange-500" id="rimesDisplay">
                -at
            </div>
        </div>

        <div class="text-center">
            <div class="text-sm uppercase tracking-widest text-slate-400 mb-2">Can you read it?</div>
            <div class="text-5xl font-black text-slate-800 mb-6" id="fullWord">cat</div>
            <button onclick="speakWord()" class="btn-bounce bg-sky-500 hover:bg-sky-600 text-white w-16 h-16 rounded-full shadow-lg flex items-center justify-center text-2xl mx-auto transition-all">
                🔊
            </button>
        </div>
    </main>

    <section class="w-full max-w-md bg-orange-50 p-6 rounded-3xl border-2 border-orange-100">
        <p class="text-center italic text-orange-800 text-lg" id="sentenceDisplay">
            The <span class="font-bold underline">cat</span> sat on the mat.
        </p>
    </section>

    <nav class="flex space-x-4">
        <button class="bg-white p-4 rounded-2xl shadow-sm btn-bounce text-slate-400">上一个</button>
        <button class="bg-white p-4 rounded-2xl shadow-sm btn-bounce text-sky-500 font-bold">下一个</button>
    </nav>

    <script>
        // 1. 数据雏形 (后续可扩充到30组)
        const currentData = {
            family: "-at",
            onsets: ["c", "b", "h", "m", "f", "r", "p"],
            sentence: "The {word} sat on the mat."
        };

        const onsetPicker = document.getElementById('onsetPicker');
        const fullWordDisplay = document.getElementById('fullWord');
        const sentenceDisplay = document.getElementById('sentenceDisplay');

        // 2. 初始化滚轮
        function initPicker() {
            currentData.onsets.forEach((letter, index) => {
                const div = document.createElement('div');
                div.className = `picker-item ${index === 0 ? 'active' : ''}`;
                div.innerText = letter;
                onsetPicker.appendChild(div);
            });
        }

        // 3. 监听滚动并更新单词
        onsetPicker.addEventListener('scroll', () => {
            const index = Math.round(onsetPicker.scrollTop / 100);
            const items = document.querySelectorAll('.picker-item');
            
            items.forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            if(currentData.onsets[index]) {
                const currentOnset = currentData.onsets[index];
                const word = currentOnset + currentData.family.replace('-', '');
                fullWordDisplay.innerText = word;
                sentenceDisplay.innerHTML = currentData.sentence.replace('{word}', `<span class="font-bold underline">${word}</span>`);
            }
        });

        // 4. 语音合成 (Web Speech API)
        function speakWord() {
            const word = fullWordDisplay.innerText;
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.8; // 语速稍慢，适合孩子
            window.speechSynthesis.speak(utterance);
        }

        initPicker();
    </script>
</body>
</html>
